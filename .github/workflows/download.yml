name: Steam Workshop Downloader (3 Engines)

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: 'Steam App ID'
        required: true
        default: '108600'
      workshop_id:
        description: 'Workshop Item ID'
        required: true
        default: '3677017550'
      download_method:
        description: 'Download engine'
        required: true
        type: choice
        options:
          - steamcmd (anonymous)
          - workshopdl (anonymous)
          - depotdownloader (anonymous)
      max_chunk_size_mb:
        description: 'Max size per chunk in MB (0 = no split)'
        required: false
        default: '50'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install base dependencies
        run: sudo apt update && sudo apt install -y unzip curl jq

      # ------------------------------------------------------------------
      # Engine 1: steamcmd
      # ------------------------------------------------------------------
      - name: Setup steamcmd
        if: github.event.inputs.download_method == 'steamcmd (anonymous)'
        run: |
          wget -O steamcmd_linux.tar.gz https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz
          mkdir -p steamcmd
          tar -xvzf steamcmd_linux.tar.gz -C steamcmd
          chmod +x steamcmd/steamcmd.sh

      - name: Download with steamcmd
        if: github.event.inputs.download_method == 'steamcmd (anonymous)'
        id: steamcmd_dl
        run: |
          ./steamcmd/steamcmd.sh +login anonymous \
                                   +workshop_download_item ${{ github.event.inputs.app_id }} ${{ github.event.inputs.workshop_id }} \
                                   +quit
          MOD_FOLDER="$HOME/Steam/steamapps/workshop/content/${{ github.event.inputs.app_id }}/${{ github.event.inputs.workshop_id }}"
          if [ ! -d "$MOD_FOLDER" ]; then
            echo "Error: steamcmd download failed – folder not found"
            exit 1
          fi
          echo "MOD_FOLDER=$MOD_FOLDER" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------------
      # Engine 2: WorkshopDL
      # ------------------------------------------------------------------
      - name: Download WorkshopDL CLI
        if: github.event.inputs.download_method == 'workshopdl (anonymous)'
        run: |
          wget https://github.com/WorkshopDL/WorkshopDL/releases/latest/download/workshopdl-linux-x64
          chmod +x workshopdl-linux-x64

      - name: Download with WorkshopDL
        if: github.event.inputs.download_method == 'workshopdl (anonymous)'
        id: workshopdl_dl
        run: |
          WORKSHOP_URL="https://steamcommunity.com/sharedfiles/filedetails/?id=${{ github.event.inputs.workshop_id }}"
          mkdir -p workshop_output
          ./workshopdl-linux-x64 download "$WORKSHOP_URL" --output workshop_output
          MOD_FOLDER=$(find workshop_output -mindepth 1 -maxdepth 1 -type d | head -1)
          if [ -z "$MOD_FOLDER" ]; then
            echo "Error: WorkshopDL did not create a mod folder"
            exit 1
          fi
          echo "MOD_FOLDER=$MOD_FOLDER" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------------
      # Engine 3: DepotDownloader (fixed)
      # ------------------------------------------------------------------
      - name: Setup .NET
        if: github.event.inputs.download_method == 'depotdownloader (anonymous)'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download DepotDownloader (latest release)
        if: github.event.inputs.download_method == 'depotdownloader (anonymous)'
        run: |
          LATEST_URL=$(curl -s https://api.github.com/repos/SteamRE/DepotDownloader/releases/latest | grep -oP '"browser_download_url": "\K[^"]+' | head -1)
          if [ -z "$LATEST_URL" ]; then
            echo "Failed to get latest release URL"
            exit 1
          fi
          echo "Downloading from $LATEST_URL"
          wget -O DepotDownloader.zip "$LATEST_URL"
          mkdir -p DepotDownloader
          unzip DepotDownloader.zip -d DepotDownloader

      - name: Download with DepotDownloader
        if: github.event.inputs.download_method == 'depotdownloader (anonymous)'
        id: depot_dl
        run: |
          cd DepotDownloader
          dotnet DepotDownloader.dll -app ${{ github.event.inputs.app_id }} -pubfile ${{ github.event.inputs.workshop_id }} -anonymous
          MOD_FOLDER=$(find . -type d -path "*/${{ github.event.inputs.app_id }}/${{ github.event.inputs.workshop_id }}" | head -1)
          if [ -z "$MOD_FOLDER" ]; then
            MOD_FOLDER=$(find . -type d -name "${{ github.event.inputs.workshop_id }}" | head -1)
          fi
          if [ -z "$MOD_FOLDER" ]; then
            echo "Error: DepotDownloader did not create mod folder"
            exit 1
          fi
          MOD_FOLDER=$(realpath "$MOD_FOLDER")
          echo "MOD_FOLDER=$MOD_FOLDER" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------------
      # Common post-processing
      # ------------------------------------------------------------------
      - name: Get mod name from Steam API
        id: modname
        run: |
          API_URL="https://api.steampowered.com/ISteamRemoteStorage/GetPublishedFileDetails/v1/"
          MOD_NAME=$(curl -s -X POST -d "itemcount=1&publishedfileids[0]=${{ github.event.inputs.workshop_id }}" $API_URL \
            | jq -r '.response.publishedfiledetails[0].title' \
            | sed 's/[^a-zA-Z0-9_-]/_/g' \
            | cut -c1-50)
          if [ -z "$MOD_NAME" ] || [ "$MOD_NAME" = "null" ]; then
            MOD_NAME="mod_${{ github.event.inputs.workshop_id }}"
          fi
          TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
          BASE_NAME="${MOD_NAME}_${{ github.event.inputs.app_id }}_${{ github.event.inputs.workshop_id }}_${TIMESTAMP}"
          echo "BASE_NAME=$BASE_NAME" >> $GITHUB_OUTPUT

      - name: Zip and optionally split the mod
        run: |
          METHOD="${{ github.event.inputs.download_method }}"
          if [ "$METHOD" = "steamcmd (anonymous)" ]; then
            MOD_FOLDER="${{ steps.steamcmd_dl.outputs.MOD_FOLDER }}"
          elif [ "$METHOD" = "workshopdl (anonymous)" ]; then
            MOD_FOLDER="${{ steps.workshopdl_dl.outputs.MOD_FOLDER }}"
          else
            MOD_FOLDER="${{ steps.depot_dl.outputs.MOD_FOLDER }}"
          fi
          if [ -z "$MOD_FOLDER" ] || [ ! -d "$MOD_FOLDER" ]; then
            echo "Error: MOD_FOLDER is empty or does not exist"
            exit 1
          fi
          mkdir -p downloads
          BASE_NAME="${{ steps.modname.outputs.BASE_NAME }}"
          TEMP_ZIP="downloads/${BASE_NAME}.tmp.zip"
          (cd "$MOD_FOLDER" && zip -r "$GITHUB_WORKSPACE/${TEMP_ZIP}" .)
          ZIP_SIZE=$(stat -c%s "$TEMP_ZIP")
          CHUNK_SIZE_MB=${{ github.event.inputs.max_chunk_size_mb }}
          if [ "$CHUNK_SIZE_MB" -gt 0 ] && [ "$ZIP_SIZE" -gt $((CHUNK_SIZE_MB * 1048576)) ]; then
            echo "Mod larger than ${CHUNK_SIZE_MB}MB – splitting into chunks..."
            cd downloads
            split -b $((CHUNK_SIZE_MB * 1048576)) -d "${BASE_NAME}.tmp.zip" "${BASE_NAME}.part_"
            rm "${BASE_NAME}.tmp.zip"
            for file in ${BASE_NAME}.part_*; do
              mv "$file" "${file}.zip"
            done
            echo "Split into $(ls ${BASE_NAME}.part_*.zip | wc -l) parts."
            cd ..
          else
            mv "$TEMP_ZIP" "downloads/${BASE_NAME}.zip"
            echo "Mod size $(numfmt --to=iec $ZIP_SIZE). No split needed."
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Add mod ${{ github.event.inputs.workshop_id }} via ${{ github.event.inputs.download_method }} [skip ci]" || echo "No changes"
          git push
